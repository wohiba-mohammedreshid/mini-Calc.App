<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scientific Calculator PWA</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .calculator {
      background: #1e293b;
      border-radius: 20px;
      padding: 20px;
      width: 360px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .display {
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      font-size: 1.5rem;
      text-align: right;
      margin-bottom: 10px;
      min-height: 60px;
      overflow-x: auto;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #334155;
      color: white;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { background: #475569; }
    button:active { transform: scale(0.95); }

    .operator { background: #6366f1; }
    .equal { background: #22c55e; }
    .clear { background: #ef4444; }
    .history-btn { background: #0ea5e9; }

    .history {
      margin-top: 10px;
      background: #020617;
      border-radius: 10px;
      padding: 10px;
      max-height: 120px;
      overflow-y: auto;
      display: none;
    }

    .history div {
      font-size: 0.8rem;
      border-bottom: 1px solid #1e293b;
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <div class="calculator">

    <div class="top-bar">
      <button class="history-btn" onclick="toggleHistory()">History</button>
      <button class="clear" onclick="clearDisplay()">C</button>
      <button onclick="backspace()">⌫</button>
    </div>

    <div id="display" class="display">0</div>

    <div class="buttons">
      <button onclick="append('(')">(</button>
      <button onclick="append(')')">)</button>
      <button onclick="percent()">%</button>
      <button onclick="append('/')" class="operator">÷</button>
      <button onclick="append('*')" class="operator">×</button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button onclick="append('-')" class="operator">-</button>
      <button onclick="append('+')" class="operator">+</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button onclick="append('Math.sqrt(')">√</button>
      <button onclick="append('**')">x^y</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button onclick="append('sin(')">sin</button>
      <button onclick="append('cos(')">cos</button>

      <button onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button onclick="calculate()" class="equal">=</button>
      <button onclick="append('tan(')">tan</button>
      <button onclick="append('Math.log10(')">log</button>
    </div>

    <div id="history" class="history"></div>

  </div>

  <script>
    const display = document.getElementById('display');
    const historyDiv = document.getElementById('history');

    let history = JSON.parse(localStorage.getItem('history')) || [];
    let degreeMode = true;

    function append(value) {
      if (display.innerText === '0') display.innerText = '';
      display.innerText += value;
    }

    function clearDisplay() {
      display.innerText = '0';
    }

    function backspace() {
      display.innerText = display.innerText.slice(0, -1) || '0';
    }

    function percent() {
      display.innerText = eval(display.innerText) / 100;
    }

    function toRadians(val) {
      return degreeMode ? val * (Math.PI / 180) : val;
    }

    function sin(x) { return Math.sin(toRadians(x)); }
    function cos(x) { return Math.cos(toRadians(x)); }
    function tan(x) { return Math.tan(toRadians(x)); }

    function calculate() {
      try {
        const expr = display.innerText;
        const result = eval(expr);
        display.innerText = result;

        const entry = `${expr} = ${result}`;
        history.push(entry);
        localStorage.setItem('history', JSON.stringify(history));
        renderHistory();
      } catch {
        display.innerText = 'Error';
      }
    }

    function toggleHistory() {
      historyDiv.style.display = historyDiv.style.display === 'block' ? 'none' : 'block';
    }

    function renderHistory() {
      historyDiv.innerHTML = history.map(h => `<div>${h}</div>`).join('');
    }

    renderHistory();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
