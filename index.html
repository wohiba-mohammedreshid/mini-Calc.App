<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2344/2344132.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2344/2344132.png">    <title>Pro Scientific Calculator</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #6366f1;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculator {
            background: var(--panel);
            border-radius: 24px;
            padding: 24px;
            width: 380px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .window-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .controls { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .close { background: var(--danger); }
        .min { background: #f59e0b; }
        .max { background: var(--success); }

        .display-container {
            background: #020617;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid #334155;
        }

        #equation {
            font-size: 0.9rem;
            color: #94a3b8;
            text-align: right;
            min-height: 1.2rem;
            word-wrap: break-word;
        }

        #display {
            font-size: 2.2rem;
            text-align: right;
            margin-top: 5px;
            overflow-x: hidden;
            white-space: nowrap;
        }

        .control-bar {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px 5px;
            border: none;
            border-radius: 12px;
            background: #334155;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background: #475569; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        .op { background: var(--accent); }
        .eq { background: var(--success); grid-column: span 1; }
        .clr { background: var(--danger); }

        .history-panel {
            margin-top: 15px;
            background: #0f172a;
            border-radius: 12px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .history-panel.open { max-height: 150px; padding: 10px; border: 1px solid #334155; }
        .history-item { font-size: 0.8rem; padding: 5px 0; border-bottom: 1px solid #1e293b; color: #94a3b8; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="window-bar">
        <div style="display:flex; align-items:center; gap:10px">
            <div style="width:12px; height:12px; background:var(--accent); border-radius:3px"></div>
            <span style="font-size:0.8rem; font-weight:bold; letter-spacing:1px">SCIENTIFIC</span>
        </div>
        <div class="controls">
            <div class="dot min" onclick="minimizeApp()"></div>
            <div class="dot max" onclick="maximizeApp()"></div>
            <div class="dot close" onclick="location.reload()"></div>
        </div>
    </div>

    <div class="display-container">
        <div id="equation"></div>
        <div id="display">0</div>
    </div>

    <div class="control-bar">
        <button onclick="toggleHistory()" style="background:#0ea5e9">History</button>
        <button id="modeBtn" onclick="toggleMode()">DEG</button>
        <button class="clr" onclick="clearDisplay()">AC</button>
        <button onclick="backspace()">⌫</button>
    </div>

    <div class="buttons">
        <button onclick="input('(')">(</button>
        <button onclick="input(')')">)</button>
        <button onclick="input('%')">%</button>
        <button class="op" onclick="input('/')">÷</button>
        <button class="op" onclick="input('*')">×</button>

        <button onclick="input('7')">7</button>
        <button onclick="input('8')">8</button>
        <button onclick="input('9')">9</button>
        <button class="op" onclick="input('-')">-</button>
        <button class="op" onclick="input('+')">+</button>

        <button onclick="input('4')">4</button>
        <button onclick="input('5')">5</button>
        <button onclick="input('6')">6</button>
        <button onclick="mathFunc('sqrt')">√</button>
        <button onclick="input('**')">xʸ</button>

        <button onclick="input('1')">1</button>
        <button onclick="input('2')">2</button>
        <button onclick="input('3')">3</button>
        <button onclick="mathFunc('sin')">sin</button>
        <button onclick="mathFunc('cos')">cos</button>

        <button onclick="input('0')">0</button>
        <button onclick="input('.')">.</button>
        <button class="eq" onclick="calculate()">=</button>
        <button onclick="mathFunc('tan')">tan</button>
        <button onclick="mathFunc('log')">log</button>
    </div>

    <div id="historyPanel" class="history-panel"></div>
</div>

<script>
    const display = document.getElementById('display');
    const equationDisplay = document.getElementById('equation');
    const historyPanel = document.getElementById('historyPanel');
    let isDegree = true;
    let currentInput = '0';
    let fullEquation = '';

    function updateDisplay() {
        display.innerText = currentInput;
        equationDisplay.innerText = fullEquation;
    }

    function input(char) {
        if (currentInput === '0' && char !== '.') currentInput = '';
        if (char === '.' && currentInput.includes('.')) return;
        currentInput += char;
        updateDisplay();
    }

    function mathFunc(type) {
        if (currentInput === '0') currentInput = '';
        switch(type) {
            case 'sin': currentInput += 'sin('; break;
            case 'cos': currentInput += 'cos('; break;
            case 'tan': currentInput += 'tan('; break;
            case 'log': currentInput += 'log('; break;
            case 'sqrt': currentInput += 'sqrt('; break;
        }
        updateDisplay();
    }

    function clearDisplay() {
        currentInput = '0';
        fullEquation = '';
        updateDisplay();
    }

    function backspace() {
        currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0';
        updateDisplay();
    }

    function toggleMode() {
        isDegree = !isDegree;
        document.getElementById('modeBtn').innerText = isDegree ? 'DEG' : 'RAD';
    }

    function calculate() {
        try {
            let context = currentInput
                .replace(/sin\(/g, isDegree ? 'Math.sin(Math.PI/180*' : 'Math.sin(')
                .replace(/cos\(/g, isDegree ? 'Math.cos(Math.PI/180*' : 'Math.cos(')
                .replace(/tan\(/g, isDegree ? 'Math.tan(Math.PI/180*' : 'Math.tan(')
                .replace(/log\(/g, 'Math.log10(')
                .replace(/sqrt\(/g, 'Math.sqrt(');

            // Close unclosed parentheses automatically
            const openBrackets = (context.match(/\(/g) || []).length;
            const closeBrackets = (context.match(/\)/g) || []).length;
            for(let i=0; i < openBrackets - closeBrackets; i++) { context += ')'; }

            let result = eval(context);
            if (!Number.isInteger(result)) result = parseFloat(result.toFixed(8));
            
            saveHistory(`${currentInput} = ${result}`);
            fullEquation = currentInput + ' =';
            currentInput = result.toString();
            updateDisplay();
        } catch (e) {
            display.innerText = 'Error';
            setTimeout(clearDisplay, 1500);
        }
    }

    function saveHistory(item) {
        let history = JSON.parse(localStorage.getItem('calcHistory') || '[]');
        history.unshift(item);
        localStorage.setItem('calcHistory', JSON.stringify(history.slice(0, 10)));
        renderHistory();
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('calcHistory') || '[]');
        historyPanel.innerHTML = history.map(h => `<div class="history-item">${h}</div>`).join('');
    }

    function toggleHistory() {
        historyPanel.classList.toggle('open');
        renderHistory();
    }

    // Window Functions
    function minimizeApp() { document.querySelector('.calculator').style.transform = 'scale(0.8)'; }
    function maximizeApp() { document.querySelector('.calculator').style.transform = 'scale(1)'; }

    if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('Service Worker Registered'))
      .catch(err => console.log('Service Worker Failed', err));
  });
}
</script>
</body>
</html>
